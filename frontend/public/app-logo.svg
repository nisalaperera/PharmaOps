<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#008080"/>
      <stop offset="100%" stop-color="#004B79"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="68" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#008080"/>
      <stop offset="100%" stop-color="#004B79"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="4" width="48" height="48" rx="11" fill="url(#bg)"/>

  <!-- Pill shape (rotated 45°) -->
  <g transform="translate(24,28) rotate(45)">
    <rect x="-13" y="-5" width="26" height="10" rx="5" fill="white" opacity="0.95"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="url(#bg)" stroke-width="1.2"/>
  </g>

  <!-- Small cross above pill -->
  <g transform="translate(24,15)">
    <rect x="-1.2" y="-4" width="2.4" height="8" rx="1.2" fill="white" opacity="0.7"/>
    <rect x="-4" y="-1.2" width="8" height="2.4" rx="1.2" fill="white" opacity="0.7"/>
  </g>

  <!-- App name text -->
  <text
    x="62"
    y="34"
    font-family="Inter, Segoe UI, Arial, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.5"
    fill="url(#text-grad)"
  >PharmaOps</text>
</svg>
