<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#008080"/>
      <stop offset="100%" stop-color="#004B79"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Pill shape (rotated 45°) -->
  <g transform="translate(32,32) rotate(45)">
    <rect x="-18" y="-7" width="36" height="14" rx="7" fill="white" opacity="0.95"/>
    <!-- Divider line in center -->
    <line x1="0" y1="-7" x2="0" y2="7" stroke="url(#bg)" stroke-width="1.5"/>
  </g>

  <!-- Small cross / plus mark above pill -->
  <g transform="translate(32,17)">
    <rect x="-1.5" y="-5" width="3" height="10" rx="1.5" fill="white" opacity="0.7"/>
    <rect x="-5" y="-1.5" width="10" height="3" rx="1.5" fill="white" opacity="0.7"/>
  </g>
</svg>
